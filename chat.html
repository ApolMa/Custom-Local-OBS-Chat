<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" type="text/css" href="font/valera_round/stylesheet.css">
<style>
body {font-family: "Varela Round";}
.chat_line {
    margin-bottom: 5px;
    padding-left: 8px;
    font-size: 20px;
    line-height: 1.5;
    animation: appear 1s ease-in-out;
}
.username-container{
    display: inline-block;
    font-weight: bold;
    position: relative;
    background-color: rgba(255,255,255,1);
    border: 3px solid rgba(255, 192, 203, 1);
    border-radius: 30px;
    padding: 4px 12px 4px 12px;
    margin-bottom: -8px;
    z-index: 2;
    animation: waverot 2s linear infinite;
}
.username{
    font-weight: bold;
    color:white;
    animation: wave 1s ease-in-out infinite;
    
}
.message-container{
    display: inline-block;
    background-color: rgba(255,255,255, 1);
    border: 3px solid rgba(255, 192, 203, 1);
    border-radius: 30px;
    padding: 8px 16px;
    margin-left: 24px;
    margin-top: -5px;
    z-index: 1;
    animation: waverot 3s linear infinite;
}
.message{
    animation: wave 1s ease-in-out infinite;
}
.emote {
    height: 1.5em;
    vertical-align: middle;
    animation: wave 2s ease-in-out infinite;
    display: inline-block;
}
#chat {
    display: flex;
    float:left;
    flex-direction: column-reverse;
    position: fixed;
    bottom: 0;
    width: 30%;
    padding-right: 10px;
    overflow: hidden;
}
@keyframes wave {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(2px); }
}
@keyframes waverot {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    25% { transform: translateY(2px) rotate(1deg); }
    75% { transform: translateY(2px) rotate(-1deg); }
}
@keyframes appear {
    0% { transform: translateY(20px); opacity: 0%; }
    30% { transform: translateY(-5px); opacity: 0%}
    60% { transform: translateY(5px); opacity: 50%;}
    100% { transform: translateY(0px); opacity: 100%;}
}
</style>
</head>
<body>
<div id="chat"></div>
<script>
const CHANNEL = "apolma_";
const TV7_USER_ID = "01KQD2CWRPMCFJ527RR5N97PA3";
let emotes = {};

async function load7TVEmotes() {
    try {
        const res = await fetch(`https://7tv.io/v3/users/${TV7_USER_ID}`);
        const data = await res.json();
        const setId = data?.emote_sets?.[0]?.id;
        if (setId) {
            const setRes = await fetch(`https://7tv.io/v3/emote-sets/${setId}`);
            const setData = await setRes.json();
            (setData?.emotes || []).forEach(e => {
                emotes[e.name] = `https://cdn.7tv.app/emote/${e.id}/1x.webp`;
            });
        }
        const gres = await fetch("https://7tv.io/v3/emote-sets/global");
        const gdata = await gres.json();
        (gdata?.emotes || []).forEach(e => {
            emotes[e.name] = `https://cdn.7tv.app/emote/${e.id}/1x.webp`;
        });
    } catch(e) { console.error("7TV error", e); }
}

async function loadFFZEmotes() {
    try {
        const res = await fetch(`https://api.frankerfacez.com/v1/room/${CHANNEL}`);
        const data = await res.json();
        Object.values(data?.sets || {}).forEach(set => {
            (set.emoticons || []).forEach(e => {
                const url = e.urls?.[1] || e.urls?.[2] || Object.values(e.urls)[0];
                emotes[e.name] = url.startsWith("//") ? "https:" + url : url;
            });
        });
        const gres = await fetch("https://api.frankerfacez.com/v1/set/global");
        const gdata = await gres.json();
        Object.values(gdata?.sets || {}).forEach(set => {
            (set.emoticons || []).forEach(e => {
                const url = e.urls?.[1] || e.urls?.[2] || Object.values(e.urls)[0];
                emotes[e.name] = url.startsWith("//") ? "https:" + url : url;
            });
        });
    } catch(e) { console.error("FFZ error", e); }
}

async function loadAllEmotes() {
    await Promise.all([load7TVEmotes(), loadFFZEmotes()]);
    console.log("Emotes loaded:", Object.keys(emotes).length);
}
loadAllEmotes();

const ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

ws.onopen = () => {
    ws.send("PASS blah");
    ws.send("NICK justinfan12345");
    ws.send(`JOIN #${CHANNEL}`);
};

ws.onmessage = (e) => {
    const line = e.data;
    if (line.includes("PRIVMSG")) {
        const user = line.match(/:(\w+)!/)?.[1];
        const color = line.match(/color=([^;]+)/)?.[1] || "pink";
        const text = line.split("PRIVMSG #" + CHANNEL + " :")[1];
        addMessage(user, color, text);
    }
    if (line.startsWith("PING")) ws.send("PONG :tmi.twitch.tv");
};

function wrapLetters(word) {
    return word.split('').map((char, i) =>
        `<span style="display:inline-block; animation:wave 2s ease-in-out infinite; animation-delay:${i * 0.05}s">${char === ' ' ? '&nbsp;' : char}</span>`
    ).join('');
}

function parseMessage(text) {
    return text.trim().split(' ').map(word => {
        word = word.trim();
        if (emotes[word]) {
            return `<img src="${emotes[word]}" class="emote">` + ' ';
        }
        return wrapLetters(word) + ' ';
    }).join('');
}

function addMessage(user, color, text) {
    const line = document.createElement("div");
    line.className = "chat_line";
    line.style.borderColor = color;
    line.innerHTML = `<span class="username-container" style="background-color:${color}; border-color: ${color}"><span class="username">${wrapLetters(user)}</span></span><br> <span class="message-container" border-color: ${color};><span class="message">${parseMessage(text)}</span></span>`;
    document.getElementById("chat").prepend(line);
}
</script>
</body>
</html>
